<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2642;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c3e5f;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Accent bar -->
  <rect x="0" y="280" width="1200" height="70" fill="#d4af37" opacity="0.15"/>

  <!-- Main text -->
  <text x="600" y="280" font-family="Inter, Arial, sans-serif" font-size="72" font-weight="700" fill="#ffffff" text-anchor="middle">
    Nova Nest
  </text>

  <!-- Subtitle -->
  <text x="600" y="350" font-family="Inter, Arial, sans-serif" font-size="36" font-weight="400" fill="#d4af37" text-anchor="middle">
    Недвижими имоти в Стара Загора
  </text>

  <!-- Tagline -->
  <text x="600" y="420" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="300" fill="#e8eef7" text-anchor="middle">
    Вашият надежден партньор за имоти
  </text>

  <!-- Website URL -->
  <text x="600" y="550" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="400" fill="#9ca3af" text-anchor="middle">
    novanest.bg
  </text>
</svg>
