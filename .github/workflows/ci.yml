name: CI Pipeline - Nova Nest Real Estate

on:
  push:
    branches: [ master, dev ]
  pull_request:
    branches: [ master, dev ]

jobs:
  quality-checks:
    name: Quality Checks & Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4
        
      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          
      - name: Install project dependencies
        run: npm ci
        
      - name: Run TypeScript type checking
        run: npm run type-check
        
      - name: Run ESLint code quality checks
        run: npm run lint
        
      - name: Build Next.js application
        run: npm run build
        env:
          # Supabase configuration
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
                    
          # Email service
          SMTP_FROM_EMAIL: 'info@novanest.bg'
                    
          # App configuration
          NEXT_PUBLIC_APP_URL: 'http://localhost:3000'
          NEXT_PUBLIC_SITE_NAME: 'Nova Nest Real Estate'
          
          # Upload configuration
          MAX_FILE_SIZE: '5242880'
          ALLOWED_FILE_TYPES: 'jpg,jpeg,png,webp'
          
      - name: CI Results Summary
        if: always()
        run: |
          echo "✅ CI Pipeline completed"
          echo "📊 Results available in job logs"
